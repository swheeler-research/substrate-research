  abstract: "This paper proposes an architecture for preserving authority through computational composition. Three primitive types (functional, state, and credential units) compose under eight protocol mechanisms that admit governance, refuse non-reconcilable composition, and witness every act on an append-only ledger. Twelve cases from public record are used to show how the architecture's machinery would have surfaced or constrained the failure in each. The technical primitives are not novel; the integration under the protocol's structural commitments is."
