    abstract: "Technical companion to the principal paper. Specifies the architecture at conformance depth and documents the reference implementation that conforms to it. Three primitive types compose under eight protocol mechanisms specified at conformance depth; three of the principal paper's twelve cases are exhibited at mechanism-coverage depth; six unsubstantiated commitments and three categories of architectural limit are named where the mechanism is specified rather than relegated to a separate section."
